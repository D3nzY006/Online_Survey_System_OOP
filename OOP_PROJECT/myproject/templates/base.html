<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Survey System{% endblock %}</title>
    <style>
        /* Global reset */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root{
            --primary-1: #667eea;
            --primary-2: #764ba2;
            --muted: #666;
            --bg-from: #667eea;
            --bg-to: #dfdbe3;
        }

        body{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-from) 0%, var(--bg-to) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: background .4s ease;
        }

        /* container used by many pages */
        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 980px;
            padding: 28px;
            transition: all .25s ease;
        }

        .container-centered {
            width: 100%;
            max-width: 420px;
        }

        /* animations */
        @keyframes fadeIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }
        @keyframes slideIn { from{opacity:0;transform:translateX(-20px)} to{opacity:1;transform:none} }

        .fade-in { animation: fadeIn .5s ease-out both }
        .slide-in { animation: slideIn .5s ease-out both }

        h1{ color:#333; margin-bottom:12px }

        /* generic form styles */
        label{ display:block; margin-bottom:6px; color:#555 }
        input[type=text], input[type=password], textarea, select{
            width:100%; padding:10px 12px; border:1.5px solid #e6e6e6; border-radius:6px; background:#fbfbfb; transition:all .2s;
        }
        input:focus, textarea:focus, select:focus{ outline:none; box-shadow:0 6px 18px rgba(102,126,234,0.12); border-color:var(--primary-1) }

        .btn {
            display:inline-block; padding:10px 16px; border-radius:8px; color:#fff; text-decoration:none; border:none; cursor:pointer;
            background: linear-gradient(135deg,var(--primary-1) 0%, var(--primary-2) 100%);
        }

        .muted { color: var(--muted) }

        .error { background:#fff1f0; border-left:4px solid #d32f2f; color:#b71c1c; padding:10px; border-radius:6px }

        /* responsive helpers */
        @media (max-width:768px){ .card{ padding:20px } .container-centered{ max-width:360px } }
        @media (max-width:480px){ .card{ padding:16px } .container-centered{ max-width:320px } }

        /* small header */
        .site-header{ width:100%; max-width:980px; margin: 10px auto; display:flex; justify-content:space-between; align-items:center; color:#fff }
        .site-title{ font-weight:700 }
        .site-nav a{ color:#fff; margin-left:14px; text-decoration:none; font-weight:600 }
    </style>
    {% block extra_head %}{% endblock %}
 </head>
 <body>
    <header class="site-header">
        <div class="site-title">Survey System</div>
        <nav class="site-nav">
            <a href="/">Home</a>
            <a href="/login/">Login</a>
            {% block nav_links %}{% endblock %}
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    {% block extra_scripts %}{% endblock %}
 </body>
</html>
