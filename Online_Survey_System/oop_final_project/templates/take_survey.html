{% load dictget %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Take Survey</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #2c2c2c; /* Dark gray background */
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        h2 {
            color: #ffffff;
            margin-bottom: 20px;
            font-weight: 500;
        }
        
        p {
            color: #ccc;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .question-container {
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            border-left: 4px solid #4CAF50; /* Green accent */
        }
        
        .question-container p {
            margin-bottom: 15px;
            font-weight: 500;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #ddd;
            font-weight: 500;
        }
        
        .form-group select {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #ffffff;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }
        
        .form-group select:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }
        
        .form-actions {
            text-align: center;
            margin-top: 30px;
        }
        
        .form-actions button {
            background-color: #4CAF50; /* Green */
            color: white;
            padding: 14px 30px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: background-color 0.3s ease;
            width: 100%;
            max-width: 300px;
        }
        
        .form-actions button:hover {
            background-color: #45a049;
        }
        
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #4CAF50; /* Green */
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }
        
        .back-link:hover {
            color: #45a049;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>{{ survey.title }}</h2>
        <p>{{ survey.description }}</p>

        <form method="post">
            {% csrf_token %}
            {% for question in questions %}
                <div class="question-container">
                    <p>{{ question.text }}</p>
                    <div class="form-group">
                        {{ forms|dictget:question.id }}
                    </div>
                </div>
            {% endfor %}
            <div class="form-actions">
                <button type="submit">Submit</button>
            </div>
        </form>
        <a href="{% url 'survey_list' %}" class="back-link">Back to Surveys</a>
    </div>
</body>
</html>
